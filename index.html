/* ══ Constants ══ */
const NM={"กฟจ.ลำพูน":"กฟจ.ลำพูน","กฟส.ป่าซาง":"กฟส.ป่าซาง","กฟส.บ้านโฮ่ง":"กฟส.บ้านโฮ่ง","กฟส.ลี้":"กฟส.ลี้","กฟส.บ้านธิ":"กฟส.บ้านธิ","กฟย.แม่ทา":"กฟส.แม่ทา","กฟย.นครเจดีย์":"กฟส.นครเจดีย์","กฟย.เวียงหนองล่อง":"กฟส.เวียงหนองล่อง","กฟย.ทุ่งหัวช้าง":"กฟส.ทุ่งหัวช้าง","กฟย.แม่ตืน":"กฟส.แม่ตืน"};

const CSN=new Set(["ภูริช บุญยวง","ณัฐวุฒิ ไชยวรรณ","ธีรศักดิ์ ลังกาพิศาลพงษ์","ณัชพล โตน้อย","ภูริเดช ธรรมสิทธิ์","สันติ แสนหล้า","สุทธิพงศ์ วงค์แสน"]);
const DEFPS={"กฟจ.ลำพูน":48,"กฟส.ป่าซาง":16,"กฟส.บ้านโฮ่ง":16,"กฟส.ลี้":16,"กฟส.บ้านธิ":16};
const DEFWMS={"กฟจ.ลำพูน":52,"กฟส.ป่าซาง":18,"กฟส.บ้านโฮ่ง":17,"กฟส.ลี้":14,"กฟส.บ้านธิ":21};
const XST=12,OMS_T="1. งานแก้ไฟฟ้าขัดข้อง";
const TM=["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

/* ══ Firebase Key Encoding (dots not allowed in keys) ══ */
function encKeys(obj){if(!obj||typeof obj!=="object")return obj;if(Array.isArray(obj))return obj.map(encKeys);
  const r={};for(const[k,v]of Object.entries(obj))r[k.replace(/\./g,"·")]=encKeys(v);return r;}
function decKeys(obj){if(!obj||typeof obj!=="object")return obj;if(Array.isArray(obj))return obj.map(decKeys);
  const r={};for(const[k,v]of Object.entries(obj))r[k.replace(/·/g,".")]=decKeys(v);return r;}

/* ══ Firebase DB Helpers ══ */
function fbSave(y,m,data){return db.ref(DB_ROOT+"/months/"+mkey(y,m)).set(encKeys(data));}
function fbDel(y,m){return db.ref(DB_ROOT+"/months/"+mkey(y,m)).remove();}
function fbSaveExcluded(list){return db.ref(DB_ROOT+"/excluded").set(list);}

/* ══ File Processing ══ */
function processFile(wb){
  const sh=wb.Sheets[wb.SheetNames[0]];const raw=XLSX.utils.sheet_to_json(sh,{header:1});
  let month=null,year=null,currentDay=null;
  const f0=raw[0]?.[0]||"";const mM=f0.match(/Month\s+เป็น\s+(\d+)/);const yM=f0.match(/Year\s+เป็น\s+(\d+)/);
  if(mM)month=parseInt(mM[1]);if(yM)year=parseInt(yM[1]);
  let hi=-1;for(let i=0;i<Math.min(raw.length,10);i++){if(raw[i]?.includes?.("PEA_Name")||raw[i]?.[0]==="PEA_Name"){hi=i;break;}}
  if(hi<0)return null;
  const hdr=raw[hi];const cm={};hdr.forEach((h,i)=>{if(h)cm[String(h).trim()]=i;});
  const ci={pea:cm["PEA_Name"]??0,type:cm["ประเภทงาน"]??4,sup:cm["ผู้ควบคุมงาน"]??9,date:cm["วันเวลา(เปิดงาน)"]??2};
  const rows=raw.slice(hi+1).filter(r=>r[ci.pea]&&r[ci.pea]!=="PEA_Name");
  if(!currentDay&&rows.length){let mx=0;rows.forEach(r=>{const dm=String(r[ci.date]||"").match(/(\d{2})\/\d{2}\/\d{4}/);if(dm)mx=Math.max(mx,parseInt(dm[1]));});currentDay=mx||(month&&year?new Date(year,month,0).getDate():30);}
  const od={};ALL.forEach(o=>{od[o]={total:0,oms:0,pspm:0,wms:0};});
  const pd={};
  rows.forEach(r=>{
    const pea=NM[String(r[ci.pea]||"").trim()]||String(r[ci.pea]||"").trim();
    if(!od[pea])return;const jt=String(r[ci.type]||"").trim();const sup=String(r[ci.sup]||"").trim();
    od[pea].total++;if(jt===OMS_T)od[pea].oms++;else if(CSN.has(sup))od[pea].pspm++;
    const pk=pea+"|||"+sup;if(!pd[pk])pd[pk]={office:pea,name:sup,total:0,isCS:CSN.has(sup)};pd[pk].total++;
  });
  Object.values(od).forEach(d=>{d.wms=d.total-d.oms-d.pspm;});
  return{officeData:od,personData:pd,month,year,currentDay,totalRows:rows.length};
}
function cLS(od,oT,pT,wT){return LS.map(o=>{const d=od[o];const p=pT[o]||16;const ot=Math.max(oT[o]||1,.01);const w=wT[o]||14;
  const rP=Math.min((d.pspm/p)*.41,.41);const yP=Math.min((d.oms/ot)*.41,.41);const gP=Math.min((d.wms/w)*.21,.21);
  return{office:o,rP,yP,gP,kpi:rP+yP+gP,pa:d.pspm,oa:d.oms,wa:d.wms,pT:p,oT:ot,wT:w};});}
function cXS(od){return XSO.map(o=>{const t=od[o].total;const p=t/XST;return{office:o,target:XST,actual:t,pct:p,cap:Math.min(p,1)};});}

/* ══ Charts ══ */
function ChartArea({children}){
  /* Wrapper: threshold lines + rows share the same coordinate space */
  /* Lines are inside a div that matches the bar area (excludes label 140px + kpi 90px) */
  return(<div style={{position:"relative",paddingLeft:140,paddingRight:90}}>
    {/* Threshold lines — positioned relative to bar area */}
    {THR.map((t,i)=>{const lp=(t.v/SX)*100;return(
      <div key={i} style={{position:"absolute",left:"calc(140px + (100% - 230px) * "+lp/100+")",top:0,bottom:0,zIndex:2,pointerEvents:"none"}}>
        <div style={{position:"absolute",top:60,bottom:0,borderLeft:"2.5px dashed "+t.c,width:0}}/>
        <div style={{position:"absolute",top:44,left:-7,width:0,height:0,borderLeft:"7px solid transparent",borderRight:"7px solid transparent",borderTop:"10px solid "+t.c}}/>
        <div style={{position:"absolute",top:4,left:6,whiteSpace:"nowrap",fontSize:12,fontWeight:700,color:t.c,transform:"rotate(-55deg)",transformOrigin:"bottom left"}}>{t.l}</div>
      </div>);})}
    <div style={{paddingTop:68}}>{children}</div>
  </div>);}

function BarRow({office,segs,txt,tc}){
  /* Bar row: label is absolute left, kpi is absolute right, bar fills the middle */
  return(<div style={{position:"relative",marginBottom:14}}>
    <div style={{position:"absolute",left:-140,width:140,top:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:14,fontWeight:700,fontSize:13,color:"#333"}}>{office}</div>
    <div style={{height:36,background:"#eee",borderRadius:4,display:"flex",overflow:"hidden"}}>
      {segs.map((s,i)=>s.w>.3&&<div key={i} style={{width:s.w+"%",height:"100%",background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:s.tc||"#fff"}}>{s.label}</div>)}
    </div>
    <div style={{position:"absolute",right:-90,width:90,top:0,bottom:0,display:"flex",alignItems:"center",paddingLeft:10,fontSize:14,fontWeight:800,color:tc}}>{txt}</div>
  </div>);}

function LSC({data}){return(<div><ChartArea>{data.map(d=>{const segs=[];
  if(d.rP>.005)segs.push({w:(d.rP/SX)*100,bg:"#d32f2f",label:d.rP>=.05?(d.rP*100).toFixed(0)+"%":"",tc:"#fff"});
  if(d.yP>.005)segs.push({w:(d.yP/SX)*100,bg:"#fbc02d",label:d.yP>=.05?(d.yP*100).toFixed(0)+"%":"",tc:"#333"});
  if(d.gP>.005)segs.push({w:(d.gP/SX)*100,bg:"#2e7d32",label:d.gP>=.05?(d.gP*100).toFixed(0)+"%":"",tc:"#fff"});
  return <BarRow key={d.office} office={d.office} segs={segs} txt={(d.kpi*100).toFixed(2)+"%"} tc={d.kpi>=1?"#2e7d32":d.kpi>=.9?"#e65100":"#c62828"}/>;})}</ChartArea>
  <div style={{display:"flex",gap:20,justifyContent:"center",marginTop:10,flexWrap:"wrap",fontSize:12}}>
    {[["#d32f2f","ก่อสร้าง/ปรับปรุง (Max 41%)"],["#fbc02d","แก้ไฟฟ้าขัดข้อง (Max 41%)"],["#2e7d32","บำรุงรักษา/ตรวจสอบ (Max 21%)"]].map(([c,l])=>
      <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:16,height:12,borderRadius:2,background:c}}/>{l}</div>)}</div></div>);}
function XSC({data}){return(<ChartArea>{data.map(d=>{const w=(Math.min(d.pct,SX)/SX)*100;
  return <BarRow key={d.office} office={d.office} segs={[{w,bg:"linear-gradient(90deg,#1565c0,#42a5f5)",label:(d.pct*100).toFixed(0)+"%",tc:"#fff"}]} txt={(d.cap*100).toFixed(2)+"%"} tc={d.cap>=1?"#2e7d32":d.cap>=.9?"#e65100":"#c62828"}/>;})}</ChartArea>);}

/* ══ Shared Dashboard View ══ */
function Dash({data,oT,pT,wT}){
  const od=data.officeData,mo=data.month,yr=data.year,cd=data.currentDay,tr=data.totalRows;
  const mf=TM[mo]||"",yt=ty(yr);
  const ls=useMemo(()=>cLS(od,oT,pT,wT),[od,oT,pT,wT]);
  const xs=useMemo(()=>cXS(od),[od]);
  return(<div>
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:20,fontWeight:700,color:"#1a237e"}}>สรุปสถานะเปิดใบงาน WeSafe เดือน {mf} {yt}</div>
      <div style={{fontSize:14,color:"#555",marginTop:4}}>ณ วันที่ {cd} {mf} {yt} • ใบงาน {tr} รายการ</div></div>
    <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
      {[["#1565c0",tr,"ทั้งหมด"],["#d32f2f",LS.reduce((s,o)=>s+(od[o]?.pspm||0),0),"ก่อสร้าง"],["#f9a825",ALL.reduce((s,o)=>s+(od[o]?.oms||0),0),"แก้ไฟฟ้า"],["#2e7d32",LS.reduce((s,o)=>s+(od[o]?.wms||0),0),"บำรุงรักษา"]].map(([c,n,l])=>
        <div key={l} style={{flex:1,minWidth:130,background:"#fff",borderRadius:10,padding:14,textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,.06)",borderLeft:"4px solid "+c}}>
          <div style={{fontSize:26,fontWeight:700}}>{n}</div><div style={{fontSize:11,color:"#777"}}>{l}</div></div>)}</div>
    {/* LS */}
    <div style={{background:"#fff",borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
      <div style={{fontSize:16,fontWeight:700,color:"#1a237e",marginBottom:12,display:"flex",alignItems:"center",gap:8}}><I n="chart" size={18}/> กฟส. L, S</div>
      <table className="tbl"><thead>
        <tr><th rowSpan={2}>กฟส.</th><th colSpan={3} style={{background:"#37474f"}}>เป้าหมาย</th><th colSpan={3} style={{background:"#1b5e20"}}>ผลงาน</th><th rowSpan={2}>KPI</th></tr>

      </thead><tbody>{ls.map(d=>{const lv=kl(d.kpi);return(<tr key={d.office}><td className="office">{d.office}</td>
        <td style={{background:"#fff3e0"}}>{d.pT}</td><td style={{background:"#fff8e1",color:"#e65100",fontWeight:600}}>{d.oT}</td><td style={{background:"#e8f5e9"}}>{d.wT}</td>
        <td style={{fontWeight:700,color:d.pa>=d.pT?"#2e7d32":"#c62828"}}>{d.pa}</td><td style={{fontWeight:700,color:d.oa>=d.oT?"#2e7d32":"#c62828"}}>{d.oa}</td><td style={{fontWeight:700,color:d.wa>=d.wT?"#2e7d32":"#c62828"}}>{d.wa}</td>
        <td><span style={{background:lv>=4?"#c8e6c9":lv>=2?"#fff9c4":"#ffcdd2",padding:"3px 12px",borderRadius:12,fontWeight:700}}>{lv}</span></td></tr>);})}</tbody></table>
      <div style={{fontSize:14,fontWeight:700,color:"#1a237e",marginBottom:4,marginTop:8}}>สถานะ : {cd} {mf} {yt}</div>
      <LSC data={ls}/></div>
    {/* XS */}
    <div style={{background:"#fff",borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
      <div style={{fontSize:16,fontWeight:700,color:"#1a237e",marginBottom:12,display:"flex",alignItems:"center",gap:8}}><I n="chart" size={18}/> กฟส. XS — เป้าหมาย {XST} ใบงาน/เดือน</div>
      <table className="tbl"><thead><tr>{["กฟส.","เป้า","ผลงาน","%","Max","KPI"].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{xs.map(d=>{const lv=kl(d.cap);return(<tr key={d.office}><td className="office">{d.office}</td><td>{d.target}</td>
        <td style={{fontWeight:700,color:d.actual>=d.target?"#2e7d32":"#c62828"}}>{d.actual}</td><td style={{fontWeight:600}}>{(d.pct*100).toFixed(0)}%</td>
        <td style={{fontWeight:700,color:d.cap>=1?"#2e7d32":"#c62828"}}>{(d.cap*100).toFixed(2)}%</td>
        <td><span style={{background:lv>=4?"#c8e6c9":lv>=2?"#fff9c4":"#ffcdd2",padding:"3px 12px",borderRadius:12,fontWeight:700}}>{lv}</span></td></tr>);})}</tbody></table>
      <div style={{fontSize:14,fontWeight:700,color:"#1a237e",marginBottom:4,marginTop:8}}>สถานะ : {cd} {mf} {yt}</div>
      <XSC data={xs}/></div>
  </div>);
}

/* ══ Person Table ══ */
function Persons({data,excluded,onExclude,canDelete}){
  const [filt,setFilt]=useState("all");
  if(!data?.personData)return null;
  const ps=Object.values(data.personData).filter(p=>!(excluded||[]).includes(p.office+"|||"+p.name)).sort((a,b)=>b.total-a.total);
  const gr={};ALL.forEach(o=>{gr[o]=[];});ps.forEach(p=>{if(gr[p.office])gr[p.office].push(p);});
  Object.values(gr).forEach(a=>a.sort((x,y)=>{if(x.isCS&&!y.isCS)return-1;if(!x.isCS&&y.isCS)return 1;return y.total-x.total;}));
  const offices=filt==="all"?ALL:[filt];
  return(<div>
    <div style={{marginBottom:12}}><select value={filt} onChange={e=>setFilt(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:"1px solid #ccc",fontSize:14,fontFamily:"'Sarabun',sans-serif"}}>
      <option value="all">ทุกหน่วยงาน</option>{ALL.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
    {offices.map(o=>{const arr=gr[o];if(!arr?.length)return null;const tot=arr.reduce((s,p)=>s+p.total,0);
      return(<div key={o} style={{background:"#fff",borderRadius:10,padding:16,marginBottom:10,boxShadow:"0 2px 6px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:5,height:28,borderRadius:3,background:LS.includes(o)?"#1a237e":"#1565c0"}}/>
          <div><div style={{fontWeight:700,fontSize:15,color:"#1a237e"}}>{o}</div><div style={{fontSize:12,color:"#888"}}>{arr.length} คน • {tot} ใบงาน</div></div></div>
        <div style={{overflowX:"auto"}}><table className="tbl" style={{fontSize:13}}><thead><tr>
          <th style={{textAlign:"left"}}>#</th><th style={{textAlign:"left",minWidth:150}}>ชื่อ-สกุล</th><th>ประเภท</th><th style={{background:"#2e7d32"}}>จำนวน</th>
          {canDelete&&<th style={{background:"#c62828",width:36}}>ลบ</th>}</tr></thead>
        <tbody>{arr.map((p,i)=><tr key={p.name} style={{background:p.isCS?"#fff3e0":""}}>
          <td style={{textAlign:"left",color:"#888"}}>{i+1}</td><td style={{textAlign:"left",fontWeight:600}}>{p.name}</td>
          <td>{p.isCS?<span style={{fontSize:11,background:"#d32f2f",color:"#fff",padding:"2px 6px",borderRadius:8,fontWeight:600}}>ก่อสร้าง</span>:<span style={{fontSize:11,background:"#e8eaf6",padding:"2px 6px",borderRadius:8}}>ทั่วไป</span>}</td>
          <td style={{fontWeight:700,color:"#1a237e"}}>{p.total}</td>
          {canDelete&&<td><button onClick={()=>{if(confirm('ลบ "'+p.name+'"?'))onExclude(p.office+"|||"+p.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"#c62828",padding:2}}><I n="userX" size={14}/></button></td>}
        </tr>)}</tbody></table></div></div>);})}
  </div>);
}

  const handleRestore=useCallback(key=>{const next=excluded.filter(k=>k!==key);setExcluded(next);fbSaveExcluded(next);},[excluded]);

  const selData=useMemo(()=>selM?allD[mkey(selY,selM)]||null:null,[allD,selY,selM]);

                <div><div style={{fontSize:13,fontWeight:600}}>{o}</div><div style={{fontSize:11,color:"#aaa"}}>ผลงาน: {preview.officeData[o]?.oms||0}</div></div>
                <input type="number" value={omsT[o]||""} onChange={e=>{const v={...omsT};v[o]=parseFloat(e.target.value)||0;setOmsT(v);}} style={{width:60,padding:"5px 6px",border:"2px solid #ffe0b2",borderRadius:6,fontSize:14,textAlign:"center",fontFamily:"'Sarabun',sans-serif",fontWeight:700,color:"#e65100",background:"#fffde7"}}/></div>)}</div></div>
          <Dash data={preview} oT={omsT} pT={psT} wT={wmsT}/>
          <div style={{background:"#fff",borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            <div style={{fontSize:16,fontWeight:700,color:"#1a237e",marginBottom:12}}><I n="users" size={18}/> รายบุคคล</div>
            <Persons data={preview} excluded={excluded} onExclude={handleExclude} canDelete={true}/></div>
        </div>}
      </div>}

      {/* ═══ SUMMARY ═══ */}
      {page==="summary"&&<div>
        {excluded.length>0&&<div style={{background:"#fff3e0",border:"1px solid #ffe0b2",borderRadius:8,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",fontSize:13}}>
          <I n="userX" size={14} color="#e65100"/><span style={{fontWeight:600,color:"#e65100"}}>ลบแล้ว ({excluded.length}):</span>
          {excluded.map(ek=><span key={ek} style={{background:"#ffccbc",padding:"3px 10px",borderRadius:6,fontSize:12,fontWeight:600,color:"#bf360c",display:"inline-flex",alignItems:"center",gap:4}}>{ek.split("|||")[1]}
            <button onClick={()=>handleRestore(ek)} style={{background:"none",border:"none",cursor:"pointer",color:"#bf360c",padding:0}}><I n="x" size={12}/></button></span>)}</div>}
        {/* Year/Month */}
        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <I n="cal" size={18} color="#1a237e"/><span style={{fontWeight:700,fontSize:18,color:"#1a237e"}}>เลือกปี / เดือน</span>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setSelY(y=>y-1)} style={{background:"none",border:"1px solid #ccc",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}><I n="cL" size={14}/></button>
              <span style={{fontWeight:700,fontSize:18,minWidth:60,textAlign:"center"}}>{ty(selY)}</span>
              <button onClick={()=>setSelY(y=>y+1)} style={{background:"none",border:"1px solid #ccc",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}><I n="cR" size={14}/></button></div></div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Array.from({length:12},(_,i)=>{const m=i+1;const has=!!allD[mkey(selY,m)];const sel=selM===m;
              return <div key={m} onClick={()=>{if(has)setSelM(sel?null:m);}} style={{padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:600,cursor:has?"pointer":"default",background:sel?"#1a237e":has?"#e8eaf6":"#f5f5f5",color:sel?"#fff":has?"#1a237e":"#bbb",border:sel?"2px solid #1a237e":"2px solid transparent"}}>{TM[m]}{has&&!sel?" ✓":""}</div>;})}
          </div></div>
        {/* Selected month */}
        {selData&&<div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <span style={{fontWeight:700,fontSize:18,color:"#1a237e"}}>{TM[selM]} {ty(selY)}</span>
            {selData.savedBy&&<span style={{fontSize:12,color:"#888"}}>บันทึกโดย {selData.savedBy}</span>}
            <button onClick={()=>{if(confirm("ลบ "+TM[selM]+" "+ty(selY)+"?"))handleDelMonth(selY,selM);}} style={{marginLeft:"auto",padding:"6px 14px",border:"1px solid #e57373",borderRadius:6,background:"#fff",color:"#c62828",cursor:"pointer",fontSize:13,fontFamily:"'Sarabun',sans-serif"}}><I n="trash" size={13}/> ลบ</button></div>
          <div style={{display:"flex",gap:4,background:"#e8eaf6",borderRadius:10,padding:4,marginBottom:20}}>
            {[["kpi","ภาพรวม KPI","chart"],["persons","รายบุคคล","users"]].map(([k,l,ic])=>
              <button key={k} onClick={()=>setSumTab(k)} style={{flex:1,padding:10,border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:"'Sarabun',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:sumTab===k?"#1a237e":"transparent",color:sumTab===k?"#fff":"#555"}}><I n={ic} size={16}/>{l}</button>)}</div>
          {sumTab==="kpi"&&<Dash data={selData} oT={selData.omsTargets||omsT} pT={selData.psPmTargets||psT} wT={selData.wmsTargets||wmsT}/>}
          {sumTab==="persons"&&<div style={{background:"#fff",borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            <Persons data={selData} excluded={excluded} onExclude={handleExclude} canDelete={true}/></div>}
        </div>}
        {/* Year overview */}
        {Object.keys(allD).some(k=>k.startsWith(selY+"-"))&&<div style={{background:"#fff",borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#1a237e",marginBottom:16}}><I n="chart" size={18}/> ภาพรวม KPI ทั้งปี {ty(selY)}</div>
          {Array.from({length:12},(_,i)=>{const m=i+1;const md=allD[mkey(selY,m)];if(!md)return null;
            return <div key={m} style={{marginBottom:20,paddingBottom:16,borderBottom:"2px solid #e8eaf6"}}>
              <div style={{fontWeight:700,fontSize:15,color:"#1a237e",marginBottom:6}}>● {TM[m]} {ty(selY)} <span style={{fontSize:12,color:"#888",fontWeight:400}}>({md.totalRows} ใบงาน)</span></div>
              <div style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:4}}>กฟส. L, S</div>
              <LSC data={cLS(md.officeData,md.omsTargets||omsT,md.psPmTargets||psT,md.wmsTargets||wmsT)}/>
              <div style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:4,marginTop:8}}>กฟส. XS</div>
              <XSC data={cXS(md.officeData)}/></div>;}).filter(Boolean)}
        </div>}
      </div>}
    </div>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
