/* ══ Constants ══ */
const NM={"กฟจ.ลำพูน":"กฟจ.ลำพูน","กฟส.ป่าซาง":"กฟส.ป่าซาง","กฟส.บ้านโฮ่ง":"กฟส.บ้านโฮ่ง","กฟส.ลี้":"กฟส.ลี้","กฟส.บ้านธิ":"กฟส.บ้านธิ","กฟย.แม่ทา":"กฟส.แม่ทา","กฟย.นครเจดีย์":"กฟส.นครเจดีย์","กฟย.เวียงหนองล่อง":"กฟส.เวียงหนองล่อง","กฟย.ทุ่งหัวช้าง":"กฟส.ทุ่งหัวช้าง","กฟย.แม่ตืน":"กฟส.แม่ตืน"};

const PS_PER_PERSON=16; // ใบงาน/คน/เดือน
function calcDefPS(csnObj){const r={};Object.entries(csnObj||{}).forEach(([ofc,arr])=>{r[ofc]=(arr||[]).filter(n=>n.trim()).length*PS_PER_PERSON;});return r;}

const ty=y=>y?y+543:"";

/* ══ Firebase Helpers ══ */
function encKeys(obj){if(!obj||typeof obj!=="object")return obj;if(Array.isArray(obj))return obj.map(encKeys);
  const r={};for(const[k,v]of Object.entries(obj))r[k.replace(/\./g,"·")]=encKeys(v);return r;}
function decKeys(obj){if(!obj||typeof obj!=="object")return obj;if(Array.isArray(obj))return obj.map(decKeys);
  const r={};for(const[k,v]of Object.entries(obj))r[k.replace(/·/g,".")]=decKeys(v);return r;}
function fbSave(y,m,data){return db.ref(DB_ROOT+"/months/"+mkey(y,m)).set(encKeys(data));}
function fbDel(y,m){return db.ref(DB_ROOT+"/months/"+mkey(y,m)).remove();}
function fbSaveExcluded(obj){return db.ref(DB_ROOT+"/excluded").set(obj?encKeys(obj):{});}
function isFullyExcluded(excluded,office,name){const k=office+"|||"+name;const ms=excluded?.[k];return Array.isArray(ms)&&ms.includes("all");}
function isMonthExcluded(excluded,office,name,month){const k=office+"|||"+name;const ms=excluded?.[k];return Array.isArray(ms)&&(ms.includes(month)||ms.includes("all"));}
function toggleMonthExclude(excluded,office,name,month){const k=office+"|||"+name;const next={...excluded};if(!next[k])next[k]=[];if(next[k].includes(month)){next[k]=next[k].filter(m=>m!==month);if(!next[k].length)delete next[k];}else{next[k]=[...next[k].filter(m=>m!=="all"),month];}return next;}
function toggleFullExclude(excluded,office,name){const k=office+"|||"+name;const next={...excluded};if(next[k]&&next[k].includes("all")){delete next[k];}else{next[k]=["all"];}return next;}
function getMonthExcludeList(excluded,month){if(!excluded)return[];return Object.entries(excluded).filter(([k,ms])=>Array.isArray(ms)&&ms.includes(month)&&!ms.includes("all")).map(([k])=>k);}
function getFullExcludeList(excluded){if(!excluded)return[];return Object.entries(excluded).filter(([k,ms])=>Array.isArray(ms)&&ms.includes("all")).map(([k])=>k);}

/* ══ Personnel Helpers ══ */
function fbLoadPersonnel(){return db.ref(DB_ROOT+"/personnel").once("value").then(s=>{ const v=s.val(); if(!v) return []; const arr=[]; Object.entries(v).forEach(([id,d])=>arr.push({id,...decKeys(d)})); return arr; });}
function fbSavePersonnel(item){const ref=item.id?db.ref(DB_ROOT+"/personnel/"+item.id):db.ref(DB_ROOT+"/personnel").push(); const data={empId:item.empId||null,fullName:item.fullName,position:item.position||"",department:item.department||"",office:item.office}; return ref.set(encKeys(data)).then(()=>({id:ref.key,...data}));}
function fbDelPersonnel(id){return db.ref(DB_ROOT+"/personnel/"+id).remove();}
function fbBatchSavePersonnel(items){const updates={};items.forEach(item=>{const key=db.ref(DB_ROOT+"/personnel").push().key;updates[DB_ROOT+"/personnel/"+key]=encKeys({empId:item.empId||null,fullName:item.fullName,position:item.position||"",department:item.department||"",office:item.office});});return db.ref().update(updates).then(()=>items.map((item,i)=>({id:Object.keys(updates)[i]?.split("/").pop(),...item})));}

/* ══ Personnel Sorting (same pattern as Safety Talk) ══ */
function stripPrefix(name){return(name||"").replace(/^(นางสาว|น\.ส\.|นาง|นาย|ว่าที่ ร\.ต\.|ว่าที่ร\.ต\.)\s*/,"").trim();}
function getGroup(pos){if(!pos)return 0;const p=pos.trim();if(p.includes("พขร."))return 3;if(p.startsWith("คนงาน")||p.startsWith("ผู้ปฏิบัติงาน"))return 2;if(p.includes("ชชง")||p.includes("ชบช.")||p.includes("ชบค.")||p.includes("ชพด."))return 1;return 0;}
const WORKER_RANK_TABLE=[{match:"ก่อสร้าง 1",rank:0},{match:"ก่อสร้าง 2",rank:1},{match:"ก่อสร้าง",rank:2},{match:"ตัดกิ่งไม้",rank:3},{match:"ปรับปรุงระบบฯ",rank:4},{match:"ซ่อมย่อย (C5)",rank:6},{match:"ซ่อมย่อย",rank:5},{match:"เวรแก้ฯ",rank:7},{match:"หม้อแปลง",rank:8},{match:"มิเตอร์ฯ",rank:9},{match:"มิเตอร์",rank:10},{match:"คลังพัสดุ",rank:11},{match:"เวรแก้",rank:7}];
function extractNum(str){const m=(str||"").match(/(\d+)/);return m?parseInt(m[1]):0;}
function getPosRank(pos){if(!pos)return{rank:99,num:0};const p=pos.trim();
  if(p.includes("ผจก."))return{rank:0,num:extractNum(p)};if(p.includes("รจก."))return{rank:1,num:extractNum(p)};if(p.includes("หผ.(ฉ)"))return{rank:2,num:0};
  if(p.includes("นกต."))return{rank:3,num:extractNum(p)};if(p.includes("นทน."))return{rank:4,num:extractNum(p)};if(p.includes("ผชน."))return{rank:5,num:extractNum(p)};if(p.includes("จป.ว."))return{rank:6,num:extractNum(p)};
  if(p.includes("หผ."))return{rank:7,num:0};if(p.includes("ชผ."))return{rank:8,num:0};if(p.includes("นพด."))return{rank:9,num:extractNum(p)};if(p.includes("วศก."))return{rank:10,num:extractNum(p)};if(p.includes("นบช."))return{rank:11,num:extractNum(p)};if(p.includes("นบท"))return{rank:12,num:extractNum(p)};
  if(p.includes("(สข)"))return{rank:13,num:extractNum(p)};if(p.includes("(ฮล)"))return{rank:14,num:extractNum(p)};if(p.includes("(ปฟ)")&&(p.includes("พชง")||p.includes("พบช")))return{rank:15,num:extractNum(p)};
  if(p.includes("พชง.")||p.includes("พบช."))return{rank:16,num:extractNum(p)};
  if(p.includes("ชชง.(ปฟ)"))return{rank:20,num:0};if(p.includes("ชชง"))return{rank:19,num:0};if(p.includes("ชบช."))return{rank:21,num:0};if(p.includes("ชบค."))return{rank:22,num:0};if(p.includes("ชพด."))return{rank:23,num:0};
  if(p.startsWith("คนงาน")||p.startsWith("ผู้ปฏิบัติงาน")){let sub=99;for(const c of WORKER_RANK_TABLE){if(p.includes(c.match)){sub=c.rank;break;}}return{rank:30,num:sub};}
  if(p.includes("พขร."))return{rank:40,num:0};return{rank:98,num:extractNum(p)};}
const DEPT_ORDER=["กฟจ.ลำพูน","ผกส.","ผปบ.","ผมต.","ผบร.","ผบส.","ผสน.","ผคพ.","ผบง.","กฟส.ป่าซาง","กฟส.บ้านโฮ่ง","กฟส.ลี้","กฟส.บ้านธิ","กฟส.แม่ทา","กฟส.นครเจดีย์","กฟส.เวียงหนองล่อง","กฟส.ทุ่งหัวช้าง","กฟส.แม่ตืน","ผปร.","ผบค."];
function deptOrder(dept){const i=DEPT_ORDER.indexOf((dept||"").trim());return i>=0?i:500;}
function sortPersonnel(list){return[...list].sort((a,b)=>{const gA=getGroup(a.position),gB=getGroup(b.position);if(gA!==gB)return gA-gB;const dA=deptOrder(a.department),dB=deptOrder(b.department);if(dA!==dB)return dA-dB;const pA=getPosRank(a.position),pB=getPosRank(b.position);if(pA.rank!==pB.rank)return pA.rank-pB.rank;if(pA.num!==pB.num){if(pA.rank===30)return pA.num-pB.num;return pB.num-pA.num;}return(a.fullName||"").localeCompare(b.fullName||"","th");});}
function buildPersonnelMap(pList){
  // สร้าง map สำหรับแมชชื่อแบบ exact + fuzzy (ชื่อเซ็นเซอร์)
  const exactMap={};const prefixList=[];
  pList.forEach(p=>{
    const stripped=stripPrefix(p.fullName).toLowerCase();
    const hasStar=stripped.includes("*");
    if(hasStar){
      // ดึงเฉพาะส่วนที่ไม่ถูกเซ็นเซอร์ เช่น "ธีรศักดิ์ ลัง***" → "ธีรศักดิ์ ลัง"
      const prefix=stripped.replace(/\*+/g,"").replace(/\s+$/,"");
      if(prefix.length>=2)prefixList.push({prefix,person:p});
    }else{
      exactMap[stripped]=p;
    }
  });
  return{exactMap,prefixList};
}
function matchPersonnel(pMap,wesafeName){
  if(!pMap)return null;
  const key=stripPrefix(wesafeName).toLowerCase().trim();
  // 1. Exact match
  if(pMap.exactMap&&pMap.exactMap[key])return pMap.exactMap[key];
  // 2. Prefix match (ชื่อเซ็นเซอร์)
  if(pMap.prefixList){for(const{prefix,person}of pMap.prefixList){if(key.startsWith(prefix))return person;}}
  return null;
}
// เซ็นเซอร์ชื่อ: แสดงชื่อจริง + นามสกุลตัดเหลือ 2 ตัว + ***
function censorName(name){
  const stripped=stripPrefix(name||"");
  const parts=stripped.split(/\s+/);
  if(parts.length<2)return stripped;
  const first=parts[0];
  const last=parts.slice(1).join(" ");
  // เก็บตัวอักษรนามสกุล 2-3 ตัวแรก ขึ้นกับความยาว
  const keep=last.length>=4?3:last.length>=2?2:last.length;
  return first+" "+last.substring(0,keep)+"***";
}
// ดึงชื่อที่จะแสดง: ใช้ชื่อเซ็นเซอร์จาก personnel ถ้าแมชได้ / ถ้าไม่แมช ให้ auto-censor
function getDisplayName(wesafeName,pMap){
  const info=matchPersonnel(pMap,wesafeName);
  if(info){
    const censored=stripPrefix(info.fullName);
    // ถ้า personnel มี * อยู่แล้ว ใช้เลย
    if(censored.includes("*"))return censored;
    // ถ้า personnel ไม่มี * ให้ auto-censor
    return censorName(info.fullName);
  }
  // ไม่แมช → auto-censor
  return censorName(wesafeName);
}
function getPersonnelInfo(wesafeName,pMap){
  const info=matchPersonnel(pMap,wesafeName);
  return info?{position:info.position||"",department:info.department||""}:{position:"",department:""};
}

/* ══ File Processing ══ */
function processFile(wb){
  const sh=wb.Sheets[wb.SheetNames[0]];const raw=XLSX.utils.sheet_to_json(sh,{header:1});
  let month=null,year=null,currentDay=null;
  const f0=raw[0]?.[0]||"";const mM=f0.match(/Month\s+เป็น\s+(\d+)/);const yM=f0.match(/Year\s+เป็น\s+(\d+)/);
  if(mM)month=parseInt(mM[1]);if(yM)year=parseInt(yM[1]);
  let hi=-1;for(let i=0;i<Math.min(raw.length,10);i++){if(raw[i]?.includes?.("PEA_Name")||raw[i]?.[0]==="PEA_Name"){hi=i;break;}}
  if(hi<0)return null;
  const hdr=raw[hi];const cm={};hdr.forEach((h,i)=>{if(h)cm[String(h).trim()]=i;});
  const ci={pea:cm["PEA_Name"]??0,type:cm["ประเภทงาน"]??4,sup:cm["ผู้ควบคุมงาน"]??9,date:cm["วันเวลา(เปิดงาน)"]??2};
  const rows=raw.slice(hi+1).filter(r=>r[ci.pea]&&r[ci.pea]!=="PEA_Name");
  if(!currentDay&&rows.length){let mx=0;rows.forEach(r=>{const dm=String(r[ci.date]||"").match(/(\d{2})\/\d{2}\/\d{4}/);if(dm)mx=Math.max(mx,parseInt(dm[1]));});currentDay=mx||(month&&year?new Date(year,month,0).getDate():30);}
  const od={};ALL.forEach(o=>{od[o]={total:0,oms:0,pspm:0,wms:0};});
  const pd={};
  rows.forEach(r=>{
    const pea=NM[String(r[ci.pea]||"").trim()]||String(r[ci.pea]||"").trim();
    if(!od[pea])return;const jt=String(r[ci.type]||"").trim();const sup=String(r[ci.sup]||"").trim();
    const isHL=HOTLINE.has(sup);
    if(!isHL){od[pea].total++;if(jt===OMS_T)od[pea].oms++;else if(CSN.has(sup))od[pea].pspm++;}
    const pk=pea+"|||"+sup;if(!pd[pk])pd[pk]={office:pea,name:sup,total:0,isCS:CSN.has(sup),isHL};pd[pk].total++;
  });
  Object.values(od).forEach(d=>{d.wms=d.total-d.oms-d.pspm;});
  const totalRows=ALL.reduce((s,o)=>s+(od[o]?.total||0),0);
  return{officeData:od,personData:pd,month,year,currentDay,totalRows};
}
function cLS(od,oT,pT,wT){return LS.map(o=>{const d=od[o]||{pspm:0,oms:0,wms:0,total:0};const p=pT[o]||16;const ot=Math.max(oT[o]||1,.01);const w=wT[o]||14;
  const rP=Math.min((d.pspm/p)*.41,.41);const yP=Math.min((d.oms/ot)*.41,.41);const gP=Math.min((d.wms/w)*.21,.21);
  return{office:o,rP,yP,gP,kpi:rP+yP+gP,pa:d.pspm,oa:d.oms,wa:d.wms,pT:p,oT:ot,wT:w};});}
function cXS(od){return XSO.map(o=>{const d=od[o]||{total:0};const t=d.total;const p=t/XST;return{office:o,target:XST,actual:t,pct:p,cap:Math.min(p,1)};});}

function LSC({data}){return(<div><ChartArea scale={SLS}>{data.map(d=>{const segs=[];

  return <BarRow key={d.office} office={d.office} segs={segs} txt={(d.kpi*100).toFixed(2)+"%"} tc={d.kpi>=1?"#2e7d32":d.kpi>=.9?"#e65100":"#c62828"}/>;})}</ChartArea>

      <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:16,height:12,borderRadius:2,background:c}}/>{l}</div>)}</div></div>);}
function XSC({data}){return(<ChartArea scale={SXS}>{data.map(d=>{const w=(Math.min(d.pct,1.0)/SXS)*100;const isPass=d.pct>=1;
  return <BarRow key={d.office} office={d.office} segs={[{w,bg:isPass?"linear-gradient(90deg,#00897b,#4db6ac)":"linear-gradient(90deg,#c62828,#ef5350)",label:(d.pct*100).toFixed(0)+"%",tc:"#fff"}]} txt={(d.cap*100).toFixed(2)+"%"} tc={d.cap>=1?"#2e7d32":d.cap>=.9?"#e65100":"#c62828"}/>;})}</ChartArea>);}
const GL=()=><svg viewBox="0 0 24 24" style={{width:20,height:20}}><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>;

/* ══════════════════════════════════════════
   PERSONNEL MANAGER

function PersonnelManager({personnelData,setPersonnelData}){
  const [selOfc,setSelOfc]=useState(ALL[0]);
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({empId:"",fullName:"",position:"",department:""});
  const [importMsg,setImportMsg]=useState("");
  const [loadingP,setLoadingP]=useState(false);
  const fileRef=useRef();
  const formRef=useRef();

  const members=useMemo(()=>sortPersonnel(personnelData.filter(p=>p.office===selOfc)),[personnelData,selOfc]);

  const resetForm=()=>{setForm({empId:"",fullName:"",position:"",department:""});setEditing(null);setShowForm(false);};

  const handleSave=async()=>{
    if(!form.fullName.trim()){alert("กรุณากรอกชื่อ-นามสกุล");return;}
    try{
      const item={empId:form.empId.trim()||null,fullName:form.fullName.trim(),position:form.position.trim(),department:form.department.trim(),office:selOfc};
      if(editing)item.id=editing.id;
      await fbSavePersonnel(item);
      resetForm();
    }catch(e){alert("บันทึกไม่สำเร็จ: "+e.message);}
  };

  const handleDelete=async(member)=>{
    if(!confirm('ลบ "'+member.fullName+'"?'))return;
    try{await fbDelPersonnel(member.id);}catch(e){alert("ลบไม่สำเร็จ: "+e.message);}
  };

  const handleEdit=(member)=>{
    setEditing(member);setForm({empId:member.empId||"",fullName:member.fullName,position:member.position||"",department:member.department||""});
    setShowForm(true);setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),80);
  };

  const handleImport=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        setImportMsg("กำลังอ่านไฟล์...");
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        if(rows.length<2){setImportMsg("ไม่พบข้อมูลในไฟล์");return;}
        const headers=rows[0].map(h=>(h||"").toString().toLowerCase().trim());
        const findCol=(...keys)=>{for(const k of keys){const i=headers.findIndex(h=>h.includes(k));if(i>=0)return i;}return-1;};
        const colId=findCol("รหัส","id","emp");const colName=findCol("ชื่อ","name","fullname");
        const colPos=findCol("ตำแหน่ง","position","pos");const colDept=findCol("สังกัด","แผนก","dept","department");
        if(colName<0){setImportMsg("ไม่พบคอลัมน์ชื่อในไฟล์");return;}
        const toImport=[];
        for(let i=1;i<rows.length;i++){const row=rows[i];const name=(row[colName]||"").toString().trim();if(!name)continue;
          toImport.push({empId:colId>=0?(row[colId]||"").toString().trim()||null:null,fullName:name,position:colPos>=0?(row[colPos]||"").toString().trim():"",department:colDept>=0?(row[colDept]||"").toString().trim():"",office:selOfc});}
        if(toImport.length===0){setImportMsg("ไม่พบข้อมูลรายชื่อในไฟล์");return;}

            </div></td>
          </tr>)}</tbody>
        </table></div>}
    </div>
  </div>);
}

/* ══ Persons — cumulative monthly table ══ */
/* Department color map */
const DEPT_COLORS={"ผกส.":"#1565c0","ผปบ.":"#6a1b9a","ผมต.":"#00838f","ผบร.":"#2e7d32","ผบส.":"#e65100","ผสน.":"#ad1457","ผคพ.":"#4527a0","ผบง.":"#00695c","ผปร.":"#bf360c","ผบค.":"#1b5e20","แผ.":"#3949ab","ผกร.":"#5d4037","ผกส":"#1565c0","ผปบ":"#6a1b9a","ผมต":"#00838f","ผบร":"#2e7d32","ผบส":"#e65100","ผสน":"#ad1457","ผคพ":"#4527a0","ผบง":"#00695c","ผปร":"#bf360c","ผบค":"#1b5e20"};
function deptColor(d){if(!d||d==="-")return"#999";const k=d.trim();return DEPT_COLORS[k]||DEPT_COLORS[k.replace(/\.$/,"")]||"#555";}

function Persons({allData,year,currentMonth,excluded,onExclude,onFullExclude,canDelete,personnelMap,ptEnabled,ptDefault,ptTargets,onPtChange}){
  const [filt,setFilt]=useState("all");
  const [collapsed,setCollapsed]=useState({});
  const [sortMode,setSortMode]=useState("dept");
  const pMap=personnelMap||{};

  const {grouped,monthsWithData}=useMemo(()=>{
    const g={};ALL.forEach(o=>{g[o]={};});
    const mwd=new Set();
    for(let m=1;m<=12;m++){
      const md=allData[mkey(year,m)];if(!md?.personData)continue;
      mwd.add(m);
      Object.values(md.personData).forEach(p=>{
        if(!g[p.office])return;
        if(!g[p.office][p.name])g[p.office][p.name]={name:p.name,isCS:p.isCS,months:{}};
        g[p.office][p.name].months[m]=p.total;
      });
    }
    return{grouped:g,monthsWithData:mwd};
  },[allData,year]);

  const visibleMonths=useMemo(()=>{
    const ms=[];for(let m=1;m<=currentMonth;m++)if(monthsWithData.has(m))ms.push(m);
    return ms;
  },[currentMonth,monthsWithData]);

  const offices=filt==="all"?ALL:[filt];

  return(<div>
    <div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <select value={filt} onChange={e=>setFilt(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:"1px solid #ccc",fontSize:14,fontFamily:"'Sarabun',sans-serif"}}>
        <option value="all">ทุกหน่วยงาน</option>{ALL.map(o=><option key={o} value={o}>{o}</option>)}</select>
      <div style={{display:"flex",background:"#e8eaf6",borderRadius:8,padding:2,fontSize:12}}>
        {[["dept","เรียงตามสังกัด"],["count","เรียงตามจำนวนใบงาน"]].map(([k,l])=>
          <button key={k} onClick={()=>setSortMode(k)} style={{padding:"5px 12px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontFamily:"'Sarabun',sans-serif",background:sortMode===k?"#1a237e":"transparent",color:sortMode===k?"#fff":"#555"}}>{l}</button>)}
      </div>
    </div>
    {offices.map(office=>{
      let persons=Object.values(grouped[office]||{}).map(p=>{
        const info=getPersonnelInfo(p.name,pMap);
        const displayName=getDisplayName(p.name,pMap);
        return{...p,position:info.position,department:info.department,displayName,office};
      });
      if(sortMode==="dept"){
        // Sort by dept → isCS first → position → name
        persons.sort((a,b)=>{
          const dA=deptOrder(a.department),dB=deptOrder(b.department);if(dA!==dB)return dA-dB;
          if(a.isCS&&!b.isCS)return-1;if(!a.isCS&&b.isCS)return 1;
          const pA=getPosRank(a.position),pB=getPosRank(b.position);if(pA.rank!==pB.rank)return pA.rank-pB.rank;
          if(pA.num!==pB.num)return pB.num-pA.num;
          return(a.displayName||a.name||"").localeCompare(b.displayName||b.name||"","th");});
      }else{
        persons.sort((a,b)=>{
          if(a.isCS&&!b.isCS)return-1;if(!a.isCS&&b.isCS)return 1;
          const at=Object.values(a.months).reduce((s,v)=>s+v,0);const bt=Object.values(b.months).reduce((s,v)=>s+v,0);return bt-at;});
      }
      if(!persons.length)return null;
      // Split: fully excluded vs visible
      const fullyHidden=persons.filter(p=>isFullyExcluded(excluded,office,p.name));
      const visible=canDelete?persons:persons.filter(p=>!isFullyExcluded(excluded,office,p.name));
      const isExp=!collapsed[office];
      const tot=visible.reduce((s,p)=>s+Object.values(p.months).reduce((ss,v)=>ss+v,0),0);
      const monthExKeys=currentMonth?getMonthExcludeList(excluded,currentMonth).filter(k=>k.startsWith(office+"|||")):[];
      const fullExKeys=getFullExcludeList(excluded).filter(k=>k.startsWith(office+"|||"));
      return(<div key={office} style={{background:"#fff",borderRadius:10,padding:16,marginBottom:10,boxShadow:"0 2px 6px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setCollapsed(p=>({...p,[office]:!p[office]}))}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:5,height:28,borderRadius:3,background:LS.includes(office)?"#1a237e":"#1565c0"}}/>
            <div><div style={{fontWeight:700,fontSize:15,color:"#1a237e"}}>{office}</div><div style={{fontSize:12,color:"#888"}}>{visible.length} คน • รวม {tot} ใบงาน{fullyHidden.length>0&&!canDelete?" (ซ่อน "+fullyHidden.length+")":""}</div></div></div>
          {isExp?<I n="cUp" size={16} color="#888"/>:<I n="cDown" size={16} color="#888"/>}
        </div>
        {/* Fully excluded bar - admin only */}
        {isExp&&canDelete&&fullExKeys.length>0&&<div style={{background:"#ffebee",borderRadius:8,padding:"6px 12px",margin:"8px 0",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",fontSize:12}}>
          <span style={{fontWeight:600,color:"#c62828"}}>🚫 ซ่อนทั้งชื่อ ({fullExKeys.length}):</span>
          {fullExKeys.map(ek=>{const nm=ek.split("|||")[1];return <span key={ek} style={{background:"#ffcdd2",padding:"2px 8px",borderRadius:6,display:"flex",alignItems:"center",gap:4}}>
            {censorName(nm)} <button onClick={e=>{e.stopPropagation();if(onFullExclude)onFullExclude(office,nm);}} style={{background:"none",border:"none",cursor:"pointer",color:"#c62828",padding:0}}><I n="x" size={12}/></button></span>;})}
        </div>}
        {/* Month-specific exclude bar */}
        {isExp&&canDelete&&monthExKeys.length>0&&<div style={{background:"#fff3e0",borderRadius:8,padding:"6px 12px",margin:"8px 0",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",fontSize:12}}>
          <span style={{fontWeight:600,color:"#e65100"}}>ซ่อนเดือน {SM[currentMonth]} ({monthExKeys.length}):</span>
          {monthExKeys.map(ek=>{const nm=ek.split("|||")[1];return <span key={ek} style={{background:"#ffe0b2",padding:"2px 8px",borderRadius:6,display:"flex",alignItems:"center",gap:4}}>
            {censorName(nm)} <button onClick={e=>{e.stopPropagation();onExclude(office,nm,currentMonth);}} style={{background:"none",border:"none",cursor:"pointer",color:"#bf360c",padding:0}}><I n="x" size={12}/></button></span>;})}
        </div>}
        {isExp&&<div style={{overflowX:"auto",marginTop:10}}>

            <th style={{textAlign:"left"}}>#</th>

            <th style={{minWidth:60,background:"#37474f"}}>ตำแหน่ง</th>

            {visibleMonths.map(m=><th key={m} style={{minWidth:42,background:m===currentMonth?"#ff9800":"#1a237e"}}>{SM[m]}</th>)}
            <th style={{background:"#2e7d32",minWidth:48}}>รวม</th>
            {canDelete&&<th style={{background:"#c62828",width:60}}>ซ่อน</th>}
          </tr></thead>
          <tbody>
            {visible.map((p,idx)=>{const total=Object.values(p.months).reduce((s,v)=>s+v,0);
              const ptRaw=ptEnabled?(ptTargets?.[p.name]!==undefined?ptTargets[p.name]:ptDefault):null;
              const hasTarget=ptEnabled&&ptRaw!=="-"&&ptRaw!==null&&!isNaN(ptRaw);
              const pt=hasTarget?parseInt(ptRaw):null;
              const isFull=isFullyExcluded(excluded,office,p.name);

              <tr key={p.name} style={{background:isFull?"#ffebee":p.isCS?"#fff3e0":"",opacity:isFull?.5:1}}>

                {ptEnabled&&<td style={{background:"#f3e5f5",fontWeight:700,color:hasTarget?"#6a1b9a":"#999",cursor:canDelete?"pointer":"default"}} onClick={()=>{if(!canDelete||!onPtChange)return;const cur=ptRaw==="-"?"-":(pt||ptDefault);const v=prompt("เป้าหมาย/เดือน ของ "+(p.displayName||p.name)+"\n(ใส่ - ถ้าไม่กำหนดเป้า)",cur);if(v===null)return;if(v.trim()==="-"){onPtChange({...ptTargets,[p.name]:"-"});}else if(!isNaN(parseInt(v))){onPtChange({...ptTargets,[p.name]:parseInt(v)});}}}>{hasTarget?pt:"-"}</td>}
                {visibleMonths.map(m=>{const excl=isMonthExcluded(excluded,office,p.name,m);const v=p.months[m]||0;
                  const belowTarget=hasTarget&&!excl&&v<pt;
                  return <td key={m} style={{fontWeight:excl?400:700,color:excl?"#bbb":(v>0?"#1a237e":"#c62828"),background:belowTarget?"#ffebee":(m===currentMonth?"#fff8e1":"transparent"),outline:belowTarget?"2px solid #e53935":"none",outlineOffset:"-1px"}}>{excl?"–":v}</td>;})}
                <td style={{fontWeight:700,color:"#2e7d32",background:"#e8f5e9"}}>{total}</td>
                {canDelete&&<td><div style={{display:"flex",gap:2,justifyContent:"center"}}>
                  <button onClick={()=>{if(confirm('ซ่อนเดือน '+SM[currentMonth]+' ของ "'+(p.displayName||p.name)+'"'))onExclude(office,p.name,currentMonth);}} style={{background:"#fff3e0",border:"none",borderRadius:3,padding:"2px 4px",cursor:"pointer",fontSize:10,color:"#e65100"}} title={"ซ่อนเดือน "+SM[currentMonth]}>{SM[currentMonth]}</button>
                  <button onClick={()=>{if(confirm('ซ่อนทั้งชื่อ "'+(p.displayName||p.name)+'" (หายจากหน้าสาธารณะทั้งหมด)?')&&onFullExclude)onFullExclude(office,p.name);}} style={{background:"#ffebee",border:"none",borderRadius:3,padding:"2px 4px",cursor:"pointer",fontSize:10,color:"#c62828"}} title="ซ่อนทั้งชื่อ">🚫</button>
                </div></td>}
              </tr>);})}
            <tr style={{background:"#e8eaf6"}}><td colSpan={ptEnabled?6:5} style={{textAlign:"right",fontWeight:700}}>รวม</td>
              {visibleMonths.map(m=>{const mt=persons.reduce((s,p)=>s+(p.months[m]||0),0);return <td key={m} style={{fontWeight:700,color:"#1a237e"}}>{mt}</td>;})}
              <td style={{fontWeight:700,color:"#2e7d32",background:"#c8e6c9"}}>{tot}</td>
              {canDelete&&<td/>}
            </tr>
          </tbody></table>
        </div>}
      </div>);
    })}
  </div>);
}

/* ══════════════════════════════════════════ MAIN APP ══════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [page,setPage]=useState("import");
  const [preview,setPreview]=useState(null);
  const [fName,setFName]=useState("");
  const [rawWb,setRawWb]=useState(null);
  const [saved,setSaved]=useState(false);
  const [omsInc,setOmsInc]=useState({"กฟจ.ลำพูน":0,"กฟส.ป่าซาง":0,"กฟส.บ้านโฮ่ง":0,"กฟส.ลี้":0,"กฟส.บ้านธิ":0});
  const [omsDay,setOmsDay]=useState(new Date().getDate());
  const [omsDIM,setOmsDIM]=useState(new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate());

  const omsEst=useMemo(()=>{const r={};LS.forEach(o=>{const inc=omsInc[o]||0;r[o]=omsDay>0?Math.round(inc*(omsDIM/omsDay)):0;});return r;},[omsInc,omsDay,omsDIM]);
  const [psT,setPsT]=useState({});
  const [wmsT,setWmsT]=useState({...DEFWMS});
  const [xsTarget,setXsTarget]=useState(12);
  const [allD,setAllD]=useState({});
  const [excluded,setExcluded]=useState({});
  const [selY,setSelY]=useState(2026);
  const [selM,setSelM]=useState(null);
  const [sumTab,setSumTab]=useState("kpi");
  const [editing,setEditing]=useState(false);
  const [drag,setDrag]=useState(false);
  const [adminInited,setAdminInited]=useState(false);
  const [personnelData,setPersonnelData]=useState([]);
  const personnelMap=useMemo(()=>buildPersonnelMap(personnelData),[personnelData]);
  const ref=useRef();

  useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>{setUser(u);setAuthReady(true);});return unsub;},[]);
  useEffect(()=>{
    const mRef=db.ref(DB_ROOT+"/months");
    mRef.on("value",snap=>{const val=snap.val();setAllD(val?decKeys(val):{});});
    const eRef=db.ref(DB_ROOT+"/excluded");
    eRef.on("value",snap=>{const val=snap.val();if(!val){setExcluded({});return;}if(Array.isArray(val)){setExcluded({});db.ref(DB_ROOT+"/excluded").set({});}else{setExcluded(decKeys(val));}});
    const pRef=db.ref(DB_ROOT+"/personnel");
    pRef.on("value",snap=>{const v=snap.val();if(!v){setPersonnelData([]);return;}const arr=[];Object.entries(v).forEach(([id,d])=>arr.push({id,...decKeys(d)}));setPersonnelData(arr);});
    // Load saved settings (targets)
    db.ref(DB_ROOT+"/settings").once("value").then(snap=>{const s=snap.val();if(s){if(s.omsPct)setOmsPct(s.omsPct);if(s.psTargets)setPsT(decKeys(s.psTargets));if(s.wmsTargets)setWmsT(decKeys(s.wmsTargets));if(s.xsTarget)setXsTarget(s.xsTarget);if(s.ptEnabled!==undefined)setPtEnabled(s.ptEnabled);if(s.ptDefault)setPtDefault(s.ptDefault);if(s.ptTargets)setPtTargets(s.ptTargets||{});if(s.csnNames)setCsnNames(decKeys(s.csnNames));if(s.hotlineNames)setHotlineNames(s.hotlineNames);if(s.omsIncidents)setOmsInc(decKeys(s.omsIncidents));}});
    return()=>{mRef.off();eRef.off();pRef.off();};
  },[]);
  // Auto-select latest month for admin summary
  useEffect(()=>{
    const keys=Object.keys(allD).sort();if(!keys.length||adminInited)return;
    const last=keys[keys.length-1];const parts=last.split("-");
    if(parts.length===2){setSelY(parseInt(parts[0]));setSelM(parseInt(parts[1]));setAdminInited(true);}
  },[allD,adminInited]);

  const login=useCallback(()=>{auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());},[]);
  const logout=useCallback(()=>{auth.signOut();},[]);
  const readFile=useCallback(f=>{if(!f)return;const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});setRawWb(wb);const res=processFile(wb);if(res){setPreview(res);setFName(f.name);setSaved(false);setOmsDay(res.currentDay||new Date().getDate());const dim=res.month&&res.year?new Date(res.year,res.month,0).getDate():31;setOmsDIM(dim);}}catch(err){console.error(err);}};r.readAsArrayBuffer(f);},[]);

  const handleConfirm=useCallback(()=>{if(!preview)return;
    const obj={month:preview.month,year:preview.year,currentDay:preview.currentDay,totalRows:preview.totalRows,
      officeData:preview.officeData,personData:preview.personData,omsTargets:{...omsT},omsIncidents:{...omsInc},omsDay,omsDIM,omsPct,psPmTargets:{...psT},wmsTargets:{...wmsT},csnNames:{...csnNames},
      savedAt:new Date().toISOString(),savedBy:user?.displayName||user?.email||""};
    fbSave(preview.year,preview.month,obj).then(()=>setSaved(true));

    db.ref(DB_ROOT+"/settings").set(encKeys({omsPct,psTargets:{...psT},wmsTargets:{...wmsT},xsTarget,ptEnabled,ptDefault,ptTargets,csnNames:{...csnNames},hotlineNames,omsIncidents:{...omsInc}}));
  },[preview,omsT,omsInc,omsDay,omsDIM,omsPct,psT,wmsT,csnNames,user]);

  const handleDelMonth=useCallback((y,m)=>{fbDel(y,m);if(selM===m)setSelM(null);},[selM]);
  const handleExclude=useCallback((office,name,month)=>{const next=toggleMonthExclude(excluded,office,name,month);setExcluded(next);fbSaveExcluded(next);},[excluded]);
  const handleFullExclude=useCallback((office,name)=>{const next=toggleFullExclude(excluded,office,name);setExcluded(next);fbSaveExcluded(next);},[excluded]);
  const handleRestore=useCallback((key,month)=>{const[office,name]=key.split("|||");const next=toggleMonthExclude(excluded,office,name,month);setExcluded(next);fbSaveExcluded(next);},[excluded]);
  const handleFullRestore=useCallback((key)=>{const[office,name]=key.split("|||");const next=toggleFullExclude(excluded,office,name);setExcluded(next);fbSaveExcluded(next);},[excluded]);
  const [ptEnabled,setPtEnabled]=useState(false);
  const [ptDefault,setPtDefault]=useState(16);
  const [ptTargets,setPtTargets]=useState({});
  const [csnNames,setCsnNames]=useState({"กฟจ.ลำพูน":["","",""],"กฟส.ป่าซาง":[""],"กฟส.บ้านโฮ่ง":[""],"กฟส.ลี้":[""],"กฟส.บ้านธิ":[""]});
  const [hotlineNames,setHotlineNames]=useState([""]);
  useEffect(()=>{const all=[];Object.values(csnNames).forEach(arr=>arr.forEach(n=>{if(n.trim())all.push(n.trim());}));CSN=new Set(all);
    // Auto-update PS/PM targets based on CSN count
    setPsT(prev=>{const calc=calcDefPS(csnNames);const next={...prev};LS.forEach(o=>{if(!next[o]||next[o]===0)next[o]=calc[o]||0;});return next;});
  },[csnNames]);
  useEffect(()=>{HOTLINE=new Set(hotlineNames.filter(n=>n.trim()).map(n=>n.trim()));},[hotlineNames]);
  useEffect(()=>{XST=xsTarget;},[xsTarget]);
  // Re-process file when CSN or Hotline names change
  useEffect(()=>{if(rawWb&&preview&&!saved){const res=processFile(rawWb);if(res)setPreview(prev=>({...prev,officeData:res.officeData,personData:res.personData}));}},[csnNames,hotlineNames]);

  const handleEditSave=useCallback((updatedData)=>{
    fbSave(updatedData.year,updatedData.month,{...updatedData,savedAt:new Date().toISOString(),savedBy:user?.displayName||user?.email||""});
    setEditing(false);
  },[user]);

  const selData=useMemo(()=>selM?allD[mkey(selY,selM)]||null:null,[allD,selY,selM]);
  const publicUrl=useMemo(()=>window.location.origin+window.location.pathname+"?view=1",[]);

  // ═══ PUBLIC VIEW ═══
  if(isPublicView){
    const [pY,setPY]=useState(2026);const [pM,setPM]=useState(null);const [inited,setInited]=useState(false);
    // Auto-select latest month on load
    useEffect(()=>{
      const keys=Object.keys(allD).sort();if(!keys.length||inited)return;
      const last=keys[keys.length-1];const parts=last.split("-");
      if(parts.length===2){setPY(parseInt(parts[0]));setPM(parseInt(parts[1]));setInited(true);}
    },[allD,inited]);
    const pData=pM?allD[mkey(pY,pM)]||null:null;
    const pdfRef=useRef();
    const [pdfing,setPdfing]=useState(false);

    const exportPDF=async()=>{
      if(!pData||pdfing)return;setPdfing(true);
      try{
        const {jsPDF}=window.jspdf;
        const pdf=new jsPDF("p","mm","a4");const pw=210,ph=297,margin=10,cw=pw-margin*2;
        const mo=TM[pData.month]||"",yr=ty(pData.year),cd=pData.currentDay;
        const pMap=buildPersonnelMap(personnelData);
        // Helper: render HTML to canvas then to PDF page
        const renderPage=async(htmlStr,pageIdx)=>{
          const wrap=document.createElement("div");wrap.style.cssText="position:absolute;left:-9999px;top:0;width:760px;background:#fff;padding:24px;font-family:Sarabun,sans-serif;font-size:13px;color:#1a1a2e;";
          wrap.innerHTML=htmlStr;document.body.appendChild(wrap);

          const imgW=cw,imgH=(canvas.height*cw)/canvas.width;
          pdf.addImage(canvas.toDataURL("image/png"),"PNG",margin,margin,imgW,Math.min(imgH,ph-margin*2));

        // PAGE 4: กฟส.XS
        await renderPage(buildPersonTable(["กฟส.แม่ทา","กฟส.นครเจดีย์","กฟส.เวียงหนองล่อง","กฟส.ทุ่งหัวช้าง","กฟส.แม่ตืน"],"📋 สรุปรายบุคคล — กฟส.XS ("+mo+" "+yr+")"),3);
        pdf.save("WeSafe-KPI-"+mo+yr+".pdf");
      }catch(e){console.error(e);alert("เกิดข้อผิดพลาด: "+e.message);}
      finally{setPdfing(false);}
    };

    return(<div style={{minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#1a237e,#283593)",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:18,fontWeight:600}}>⚡ WeSafe KPI Dashboard — กฟจ.ลำพูน</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {pData&&<button onClick={exportPDF} disabled={pdfing} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",padding:"6px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Sarabun',sans-serif",display:"flex",alignItems:"center",gap:4}}><I n="file" size={13} color="#fff"/>{pdfing?"กำลังสร้าง PDF...":"ดาวน์โหลด PDF"}</button>}
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13,opacity:.8}}><I n="eye" size={14} color="#fff"/> Real-time</div></div></div>
      <div className="page-container" style={{maxWidth:1200,margin:"0 auto",padding:24}}>
        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <I n="cal" size={18} color="#1a237e"/><span style={{fontWeight:700,color:"#1a237e"}}>เลือกเดือน</span>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setPY(y=>y-1)} style={{background:"none",border:"1px solid #ccc",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}><I n="cL" size={14}/></button>

              <button onClick={()=>setPY(y=>y+1)} style={{background:"none",border:"1px solid #ccc",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}><I n="cR" size={14}/></button></div></div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Array.from({length:12},(_,i)=>{const m=i+1;const has=!!allD[mkey(selY,m)];const sel=selM===m;
              return <div key={m} onClick={()=>{if(has){setSelM(sel?null:m);setEditing(false);}}} style={{padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:600,cursor:has?"pointer":"default",background:sel?"#1a237e":has?"#e8eaf6":"#f5f5f5",color:sel?"#fff":has?"#1a237e":"#bbb"}}>{TM[m]}{has&&!sel?" ✓":""}</div>;})}
          </div></div>

        {selData&&!editing&&<div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:18,color:"#1a237e"}}>{TM[selM]} {ty(selY)}</span>
            {/* EDIT BUTTON */}
            <button className="ebtn primary" onClick={()=>setEditing(true)} style={{padding:"6px 16px"}}><I n="pen" size={14} color="#fff"/> แก้ไขข้อมูล</button>
            <button onClick={()=>{if(confirm("ลบ "+TM[selM]+" "+ty(selY)+"?"))handleDelMonth(selY,selM);}} className="ebtn danger" style={{marginLeft:"auto",padding:"6px 14px"}}><I n="trash" size={13} color="#fff"/> ลบ</button>
          </div>
          <div style={{display:"flex",gap:4,background:"#e8eaf6",borderRadius:10,padding:4,marginBottom:20}}>
            {[["kpi","ภาพรวม KPI","chart"],["persons","รายบุคคล","users"]].map(([k,l,ic])=>
              <button key={k} onClick={()=>setSumTab(k)} style={{flex:1,padding:10,border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:"'Sarabun',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:sumTab===k?"#1a237e":"#fff",color:sumTab===k?"#fff":"#1a237e",boxShadow:sumTab===k?"0 2px 8px rgba(26,35,126,.3)":"0 1px 3px rgba(0,0,0,.1)"}}><I n={ic} size={16}/>{l}</button>)}</div>
          {sumTab==="kpi"&&<Dash data={selData} oT={selData.omsTargets||omsT} pT={selData.psPmTargets||psT} wT={selData.wmsTargets||wmsT}/>}
          {sumTab==="persons"&&<div style={{background:"#fff",borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,color:"#6a1b9a",fontSize:14}}>📊 เป้าหมายรายบุคคล</span>
              <div style={{display:"flex",background:"#e1bee7",borderRadius:8,padding:2,fontSize:12}}>
                {[[false,"ไม่เพิ่ม"],[true,"เพิ่มเป้าหมาย"]].map(([v,l])=>
                  <button key={String(v)} onClick={()=>{setPtEnabled(v);db.ref(DB_ROOT+"/settings/ptEnabled").set(v);}} style={{padding:"5px 12px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontFamily:"'Sarabun',sans-serif",background:ptEnabled===v?"#6a1b9a":"transparent",color:ptEnabled===v?"#fff":"#555"}}>{l}</button>)}
              </div>
              {ptEnabled&&<div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,fontWeight:600,color:"#6a1b9a"}}>ค่าเริ่มต้น:</span>
                <input type="number" value={ptDefault} onChange={e=>{const v=parseInt(e.target.value);if(v>0){setPtDefault(v);db.ref(DB_ROOT+"/settings/ptDefault").set(v);}}} className="ei" style={{width:50,borderColor:"#ce93d8",color:"#6a1b9a"}}/>
                <span style={{fontSize:12,color:"#888"}}>ใบงาน/เดือน</span>
              </div>}
            </div>
            <Persons allData={allD} year={selY} currentMonth={selM} excluded={excluded} onExclude={handleExclude} onFullExclude={handleFullExclude} canDelete={true} personnelMap={personnelMap} ptEnabled={ptEnabled} ptDefault={ptDefault} ptTargets={ptTargets} onPtChange={t=>{setPtTargets(t);db.ref(DB_ROOT+"/settings/ptTargets").set(t);}}/></div>}
        </div>}

        {/* EDIT MODE */}
        {selData&&editing&&<EditPanel data={selData} onSave={handleEditSave} onCancel={()=>setEditing(false)}/>}

      </div>}

      {/* ═══ PERSONNEL ═══ */}
      {page==="personnel"&&<PersonnelManager personnelData={personnelData} setPersonnelData={setPersonnelData}/>}
    </div>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
